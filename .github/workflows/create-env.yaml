name: 'Build & Push: create-env'
on:
  push:
    branches:
    - master
    paths:
    - images/create-env/*
    - .github/workflows/create-env.yaml
  pull_request:
    paths:
    - images/create-env/*
    - .github/workflows/create-env.yaml

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-24.04
    container:
      # travier/podman-action contains newer podman/buildah versions.
      image: quay.io/travier/podman-action
      options: --privileged
    env:
      MAJOR_VERSION: 3
      MINOR_VERSION: 2
      IMAGE_NAME: create-env

    steps:
    - uses: actions/checkout@v6

    - name: Set up QEMU
      run: |
        podman run --rm --privileged \
          docker.io/tonistiigi/binfmt --install arm64

    - name: Install Tools
      run: |
        set -eu
        # jq is not installed in travier/podman-action
        dnf install -qy \
          jq
        rpm -q \
          buildah podman \
          coreutils findutils sed \
          curl jq \
          | (
            while read -r line ; do
              printf %s\\n "${line}"
              case "${line}" in (*' not installed'*)
                err=1 ;;
              esac
              done
              exit "${err-0}"
          )

    - name: Prepare
      id: prepare
      run: |
        version="$(
          curl -sSL \
            'https://raw.githubusercontent.com/bioconda/bioconda-common/master/common.sh' \
            | grep BIOCONDA_UTILS_TAG \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+'
        )"
        printf 'bioconda_utils_version=%s\n' "${version}" >> $GITHUB_OUTPUT

    - name: Build
      id: build
      uses: redhat-actions/buildah-build@v2
      with:
        image: ${{ env.IMAGE_NAME }}
        tags: >-
          latest
          ${{ env.MAJOR_VERSION }}
          ${{ env.MAJOR_VERSION }}.${{ env.MINOR_VERSION }}
        archs: amd64,arm64
        context: ./images/${{ env.IMAGE_NAME }}
        containerfiles: |
          ./images/${{ env.IMAGE_NAME }}/Dockerfile
        build-args: |
          bioconda_utils_version=${{ steps.prepare.outputs.bioconda_utils_version }}

    - name: Test
      run: |
        set -x
        image='${{ steps.build.outputs.image }}'
        for tag in ${{ steps.build.outputs.tags }} ; do
          buildah manifest inspect \
            "${image}:${tag}" \
            | jq '.manifests|{([.[].digest]|sort|join("+")): [.[]|["'"${tag}"'", .platform.architecture, .digest]|join(" ")]}'
          done \
          | jq -rs 'add|add[]' \
          | while read tag arch digest ; do
              podman images --format='{{.ID}}|{{.Digest}}|{{.RepoDigests}}' \
                | sed -n "/${digest}/{s/|.*//p;q}" \
                | xargs -n1 -- \
                  sh -xc \
                  'podman history "${1}" ; podman inspect "${1}"' --
              buildah bud \
                --arch="${arch}" \
                --build-arg=base="${image}:${tag}" \
                --file=Dockerfile.test \
                "images/${image}"
            done
        buildah rmi --prune || true

    - if: ${{ github.ref == 'refs/heads/master' }}
      name: Check Tags
      run: |
        # Quay.io does not support immutable images.
        # => Check for duplicate tags to avoid overwriting existing images.
        existing_tags="$(
          skopeo list-tags docker://quay.io/bioconda/${{ steps.build.outputs.image }} \
            | jq -r '.Tags[]'
        )" \
        || {
          echo 'Could not list tags via skopeo.'
          exit 1
        }
        for tag in ${{ steps.build.outputs.tags }} ; do
          case "${tag}" in
            latest | '${{ env.MAJOR_VERSION }}' ) ;;
            * )
              if printf %s "${existing_tags}" | grep -qxF "${tag}" ; then
                printf 'Tag %s already exists!\n' "${tag}"
                exit 1
              fi
          esac
        done

    - if: ${{ github.ref == 'refs/heads/master' }}
      name: Push
      uses: redhat-actions/push-to-registry@v2
      with:
        image: ${{ steps.build.outputs.image }}
        tags: ${{ steps.build.outputs.tags }}
        registry: ${{ secrets.QUAY_BIOCONDA_REPO }}
        username: ${{ secrets.QUAY_BIOCONDA_USERNAME }}
        password: ${{ secrets.QUAY_BIOCONDA_TOKEN }}

    - if: ${{ github.ref == 'refs/heads/master' }}
      name: Test Pushed
      run: |
        set -x
        image='${{ steps.build.outputs.image }}'
        for tag in ${{ steps.build.outputs.tags }} ; do
          buildah manifest inspect \
            "${image}:${tag}" \
            | jq '.manifests|{([.[].digest]|sort|join("+")): [.[]|["'"${tag}"'", .platform.architecture, .digest]|join(" ")]}'
          done \
          | jq -rs 'add|add[]' \
          | while read tag arch digest ; do
              podman images --format='{{.ID}}|{{.Digest}}|{{.RepoDigests}}' \
                | sed -n "/${digest}/{s/|.*//p;q}" \
                | xargs -n1 -- \
                  sh -xc \
                  'podman history "${1}" ; podman inspect "${1}"' --
              buildah bud \
                --arch="${arch}" \
                --build-arg=base="${image}:${tag}" \
                --file=Dockerfile.test \
                "images/${image}"
            done
        buildah rmi --prune || true
