recipes:
  one:
    package:
      name: one
      version: 0.1
    source:
      - url: https://somewhere # [linux]
        sha256: 123 # [linux]
      - url: https://elsewhere # [osx]
        sha256: 123 # [osx]
    build:
      number: 0
      run_exports:
        # add a run export
        # (note that jinja templating as in reality is not
        # supported by our test system to the same
        # extend as in conda build)
        - "{{ pin_subpackage('one') }}"
    requirements:
      build:
        - '{{compiler("c")}}'
    test:
      commands:
        - do nothing
    about:
      license: BSD
      home: https://elsewhere
      summary: the_summary